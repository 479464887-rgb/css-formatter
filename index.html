<!DOCTYPE html><html lang="zh-CN"><head>
<meta property="og:title" content="Css Formatter — DevKit">
<meta property="og:description" content="Free online Css Formatter tool — fast, simple, and no signup required.">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="CSS Formatter - CSS代码格式化与压缩工具"><meta property="og:title" content="CSS Formatter"><title>CSS Formatter</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:1200px;margin:0 auto;padding:24px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.options{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;font-size:13px}.options label{display:flex;align-items:center;gap:6px;cursor:pointer}.options input[type=number]{width:60px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:4px 8px;font-size:13px}.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:16px}.panel-header{background:#21262d;padding:10px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #30363d;color:#58a6ff}.panel textarea{width:100%;height:350px;background:#0d1117;color:#c9d1d9;border:none;padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:13px;resize:vertical;line-height:1.5;tab-size:4}.panel textarea:focus{outline:none}#stats{display:flex;gap:16px;padding:8px 16px;font-size:12px;color:#8b949e}</style></head><body><header><h1>🎨 CSS Formatter</h1><div class="lang-switch"><button class="active" onclick="setLang('zh')">中文</button><button onclick="setLang('en')">EN</button></div></header><div class="container"><div class="options"><label>缩进 <input type="number" id="indent" value="2" min="1" max="8"></label><label><input type="checkbox" id="sortProps" onchange="formatCSS()"> 排序属性 / Sort Props</label></div><div class="toolbar"><button class="btn btn-primary" onclick="formatCSS()">✨ 格式化 / Format</button><button class="btn" onclick="minifyCSS()">📦 压缩 / Minify</button><button class="btn" onclick="copyOutput()">📋 复制 / Copy</button><button class="btn" onclick="clearAll()">🗑 清空 / Clear</button></div><div class="panel"><div class="panel-header">输入 CSS</div><textarea id="input" placeholder="body{color:red;margin:0}.box{display:flex;padding:10px}"></textarea></div><div class="panel"><div class="panel-header">输出 / Output</div><textarea id="output" readonly placeholder="格式化结果将在这里显示..."></textarea><div id="stats"></div></div></div><script>let lang='zh';function setLang(l){lang=l;document.querySelectorAll('.lang-switch button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='zh')||(i===1&&l==='en')))}
function formatCSS(){const input=document.getElementById('input').value;if(!input){document.getElementById('output').value=lang==='zh'?'请先输入CSS代码':'Please enter CSS first';return}const indent=' '.repeat(parseInt(document.getElementById('indent').value)||2);let result='';const rules=input.split('}');for(let r of rules){r=r.trim();if(!r)continue;const bi=r.indexOf('{');if(bi===-1){result+=r+'\n';continue}const sel=r.substring(0,bi).trim();let props=r.substring(bi+1).trim();if(!props)continue;let propList=props.split(';').map(p=>p.trim()).filter(p=>p);if(document.getElementById('sortProps').checked)propList.sort();result+=sel+' {\n';for(let p of propList){const ci=p.indexOf(':');if(ci===-1)continue;result+=indent+p.substring(0,ci).trim()+': '+p.substring(ci+1).trim()+';\n'}result+='}\n\n'}document.getElementById('output').value=result.trim();updateStats(result)}function minifyCSS(){const input=document.getElementById('input').value;if(!input){document.getElementById('output').value=lang==='zh'?'请先输入CSS代码':'Please enter CSS first';return}let m=input.replace(/\/\*[\s\S]*?\*\//g,'').replace(/\s+/g,' ').replace(/\s*\{\s*/g,'{').replace(/\s*\}\s*/g,'}').replace(/\s*:\s*/g,':').replace(/\s*;\s*/g,';').replace(/;}/g,'}').trim();document.getElementById('output').value=m;updateStats(m)}function updateStats(css){const orig=document.getElementById('input').value.length;const formatted=css.length;const pct=orig?Math.round((1-formatted/orig)*100):0;document.getElementById('stats').innerHTML=lang==='zh'?'原始: '+orig+' 字符 | 输出: '+formatted+' 字符 | '+(pct>=0?'减少':'增加')+' '+Math.abs(pct)+'%':'Original: '+orig+' chars | Output: '+formatted+' chars | '+(pct>=0?'Reduced':'Increased')+' '+Math.abs(pct)+'%'}function copyOutput(){const o=document.getElementById('output');o.select();document.execCommand('copy')}function clearAll(){document.getElementById('input').value='';document.getElementById('output').value='';document.getElementById('stats').innerHTML=''}</script></body></html>
